<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Apri Instagram</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0f0f0f;
      font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
      color:#fff;
    }

    .modal{
      width:90%;
      max-width:340px;
      background:#1c1c1e;
      border-radius:20px;
      padding:28px 22px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }

    .logo{
      width:90px;
      height:90px;
      margin:0 auto 20px;
      border-radius:50%;
      background:linear-gradient(145deg,#7b2cff,#a259ff);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      font-size:22px;
    }

    .title{
      font-size:22px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .subtitle{
      font-size:14px;
      color:#aaa;
      margin-bottom:22px;
      line-height:1.4;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#3d5afe;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn:active{
      transform:scale(0.96);
    }

    .secondary{
      margin-top:14px;
      font-size:14px;
      color:#aaa;
    }
  </style>
</head>

<body>

  <div class="modal">

    <div class="logo">OVRTM</div>

    <div class="title">
      Vedi il profilo completo nell'app
    </div>

    <div class="subtitle">
      Usa l'app per vedere altro su<br>
      <b>ovrtm.overtime</b>
    </div>

    <button class="btn" id="openBtn">
      Apri Instagram
    </button>

    <div class="secondary">
      Iscriviti
    </div>

  </div>

  <script>
    const username = "ovrtm.overtime";
    const trackingUrl = "https://script.google.com/macros/s/AKfycbzQvfA1AWJyCw0zuU0jfJWy9psMdc4U006aJzISYBeJKJ10P0Nligq9N2xvk3jQcg/exec";
    const ua = navigator.userAgent || "";

    const params = new URLSearchParams(window.location.search);
    const tagId = params.get("tag") || "000";

    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);

    const webUrl = "https://www.instagram.com/" + username + "/";
    const androidIntent = "intent://www.instagram.com/" + username + "/#Intent;package=com.instagram.android;scheme=https;end";

    function detectBrowser(ua) {
      if (/Chrome/i.test(ua)) return "Chrome";
      if (/Safari/i.test(ua)) return "Safari";
      return "Altro";
    }

    async function trackScan() {
      const data = {
        src: "nfc",
        tag: tagId,
        ua: ua,
        browser: detectBrowser(ua),
        platform: isAndroid ? "Android" : isIOS ? "iOS" : "Other",
        mobile: "TRUE",
        model: isIOS ? "iPhone" : "Android"
      };

      if (navigator.sendBeacon) {
        const blob = new Blob([JSON.stringify(data)], { type: "text/plain;charset=UTF-8" });
        navigator.sendBeacon(trackingUrl, blob);
      } else {
        fetch(trackingUrl, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body: JSON.stringify(data),
          keepalive: true
        }).catch(() => {});
      }
    }

    trackScan();

    document.getElementById("openBtn").addEventListener("click", function () {
      if (isAndroid) {
        window.location.href = androidIntent;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1200);
      } else {
        window.location.href = webUrl;
      }
    });
  </script>

</body>
</html>
