<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Apri Instagram</title>

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,sans-serif;
      background:#fff;
      text-align:center;
    }

    .box{
      width:100%;
      max-width:360px;
      padding:24px;
    }

    .ig-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      padding:20px;
      border-radius:20px;
      background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
      color:#fff;
      font-size:18px;
      font-weight:bold;
      border:none;
      cursor:pointer;
      box-shadow:0 8px 22px rgba(214,41,118,0.35);
      transition:all 0.15s ease;
    }

    .ig-btn:active{
      transform:scale(0.96);
    }

    .ig-logo{
      width:22px;
      height:22px;
      border:2px solid #fff;
      border-radius:6px;
      position:relative;
    }

    .ig-logo::after{
      content:"";
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:#fff;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
    }

    .ig-user{
      margin-top:12px;
      font-size:15px;
      color:#555;
      font-weight:bold;
    }
  </style>
</head>

<body>
  <div class="box">

    <button class="ig-btn" id="openBtn">
      <div class="ig-logo"></div>
      Segui su Instagram
    </button>

    <div class="ig-user">@ovrtm.overtime</div>

  </div>

  <script>
    const username = "ovrtm.overtime";
    const trackingUrl = "https://script.google.com/macros/s/AKfycbzQvfA1AWJyCw0zuU0jfJWy9psMdc4U006aJzISYBeJKJ10P0Nligq9N2xvk3jQcg/exec";
    const ua = navigator.userAgent || "";

    const params = new URLSearchParams(window.location.search);
    const tagId = params.get("tag") || "000";

    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);

    const webUrl = "https://www.instagram.com/" + username + "/";
    const androidIntent = "intent://www.instagram.com/" + username + "/#Intent;package=com.instagram.android;scheme=https;end";

    function detectBrowser(ua) {
      if (/Instagram/i.test(ua)) return "Instagram In-App Browser";
      if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) return "Chrome";
      if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) return "Safari";
      if (/Edg/i.test(ua)) return "Edge";
      if (/Firefox/i.test(ua)) return "Firefox";
      return "Sconosciuto";
    }

    async function collectDeviceInfo() {
      let platform = "";
      let mobile = "";
      let model = "";
      const browser = detectBrowser(ua);

      if (navigator.userAgentData) {
        try {
          const high = await navigator.userAgentData.getHighEntropyValues([
            "platform",
            "model",
            "mobile"
          ]);
          platform = high.platform || "";
          mobile = String(high.mobile ?? "");
          model = high.model || "";
        } catch (e) {}
      }

      if (!platform) {
        if (/Android/i.test(ua)) platform = "Android";
        else if (/iPhone|iPad|iPod/i.test(ua)) platform = "iOS";
        else if (/Windows/i.test(ua)) platform = "Windows";
        else if (/Mac/i.test(ua)) platform = "macOS";
        else platform = "Sconosciuto";
      }

      if (!mobile) {
        mobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua) ? "TRUE" : "FALSE";
      } else {
        mobile = mobile === "true" || mobile === true ? "TRUE" : "FALSE";
      }

      if (!model) {
        if (/iPhone/i.test(ua)) model = "iPhone";
        else if (/iPad/i.test(ua)) model = "iPad";
        else if (/Android/i.test(ua)) model = "Android Device";
      }

      return {
        src: "nfc",
        tag: tagId,
        ua,
        browser,
        platform,
        mobile,
        model
      };
    }

    async function trackScan() {
      const data = await collectDeviceInfo();

      if (navigator.sendBeacon) {
        const blob = new Blob([JSON.stringify(data)], { type: "text/plain;charset=UTF-8" });
        navigator.sendBeacon(trackingUrl, blob);
      } else {
        fetch(trackingUrl, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body: JSON.stringify(data),
          keepalive: true
        }).catch(() => {});
      }
    }

    // parte subito il tracking
    trackScan();

    document.getElementById("openBtn").addEventListener("click", function () {
      if (isAndroid) {
        window.location.href = androidIntent;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1200);
      } else {
        window.location.href = webUrl;
      }
    });
  </script>
</body>
</html>
